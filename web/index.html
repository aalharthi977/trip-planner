<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مَسار</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--bg2:#FFFFFF;--bg3:#EDEAE3;--bg4:#E3E0D8;
  --card:#FFFFFF;--border:#DDD9D0;--border2:#C8C4BB;
  --ink:#1A1916;--ink2:#52504A;--ink3:#9A9890;
  --green:#2A7A58;--green-lt:#3A9A70;--green-dim:rgba(42,122,88,0.1);
  --gold:#A07030;--gold-dim:rgba(160,112,48,0.1);
  --coral:#B84838;--coral-dim:rgba(184,72,56,0.1);
  --blue:#3A6AAE;--blue-dim:rgba(58,106,174,0.1);
  --purple:#6850AE;--purple-dim:rgba(104,80,174,0.1);
  --red:#A83838;--red-dim:rgba(168,56,56,0.1);
  --shadow:0 1px 3px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.1);
}
[data-theme="dark"]{
  --bg:#0F0E0C;--bg2:#161513;--bg3:#1D1B19;--bg4:#242220;
  --card:#161513;--border:#2A2825;--border2:#363330;
  --ink:#F2EDE4;--ink2:#A8A49C;--ink3:#5A5752;
  --green:#3A9A70;--green-lt:#4DB885;--green-dim:rgba(58,154,112,0.13);
  --gold:#C4903A;--gold-dim:rgba(196,144,58,0.13);
  --coral:#C45840;--coral-dim:rgba(196,88,64,0.13);
  --blue:#4A7EC4;--blue-dim:rgba(74,126,196,0.13);
  --purple:#8060C4;--purple-dim:rgba(128,96,196,0.13);
  --red:#C44848;--red-dim:rgba(196,72,72,0.13);
}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Arabic','Fraunces',sans-serif;font-size:14px;line-height:1.65;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.hidden{display:none!important}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .25s ease both}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 16px;border-radius:7px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--ink2);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn-primary:hover{opacity:.88}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:var(--green-lt);border-color:var(--green-lt)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink2)}
.btn-ghost:hover{background:var(--bg3)}
.btn svg{width:14px;height:14px;flex-shrink:0;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-sm{padding:5px 11px;font-size:12px}
.act{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;padding:0}
.act svg{width:13px;height:13px;stroke:var(--ink3);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.act:hover{background:var(--bg3);border-color:var(--border2)}.act:hover svg{stroke:var(--ink)}
.act.danger:hover{background:var(--red-dim);border-color:var(--red)}.act.danger:hover svg{stroke:var(--red)}

/* ── FORMS ── */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:7px;font-size:13px;font-family:inherit;background:var(--bg3);color:var(--ink);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px var(--green-dim)}
textarea{resize:vertical;min-height:68px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.toggle-wrap{display:flex;align-items:center;gap:12px;padding:6px 0}
.toggle-wrap label{font-size:13px;color:var(--ink2);cursor:pointer;flex:1;line-height:1.4}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:20px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);max-height:92vh;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:1rem;font-weight:600;color:var(--ink)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}
.modal-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;inset-inline-end:1.5rem;z-index:999;background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:7px;font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(12px);opacity:0;transition:all .22s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ══════════════════════════
   NAV — shared
══════════════════════════ */
.nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100;flex-shrink:0}.nav-inner{max-width:860px;margin:0 auto;padding:0 2rem;width:100%;display:flex;align-items:center;gap:2rem}
.logo{display:flex;align-items:baseline;gap:5px;cursor:pointer;flex-shrink:0;text-decoration:none}
.logo-ar{font-size:1.15rem;font-weight:700;color:var(--ink)}
.logo-dot{color:var(--ink3);font-size:.9rem}
.logo-en{font-size:.9rem;font-weight:300;color:var(--ink3)}
.nav-links{display:flex;gap:1.5rem}
.nav-link{font-size:13px;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;padding:2px 0;border-bottom:2px solid transparent;transition:all .15s}
.nav-link:hover{color:var(--ink)}
.nav-link.active{color:var(--ink);border-bottom-color:var(--green)}
.nav-spacer{flex:1}
.nav-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .15s}
.icon-btn:hover{background:var(--bg3);color:var(--ink)}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:2px;gap:2px}
.lang-opt{padding:3px 9px;border:none;background:transparent;color:var(--ink3);font-size:12px;font-weight:500;border-radius:5px;cursor:pointer;transition:all .15s;font-family:inherit}
.lang-opt.active{background:var(--bg2);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 3px}
.user-av{width:24px;height:24px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--green)}
.user-nm{font-size:12px;color:var(--ink2)}

/* ══════════════════════════
   LANDING
══════════════════════════ */
#screen-landing.active{display:flex;flex-direction:column}
.land-inner{max-width:860px;margin:0 auto;padding:0 2rem;width:100%}

/* Hero featured */
.land-hero{padding:2.5rem 0 0}
.hero-card{background:var(--ink);border-radius:12px;overflow:hidden;display:flex;flex-direction:row-reverse;min-height:220px;cursor:pointer;transition:opacity .18s}
.hero-card:hover{opacity:.93}
.hero-card-img{width:280px;flex-shrink:0;background:#1e3528;display:flex;align-items:center;justify-content:center;position:relative}
.hero-map-icon{width:48px;height:48px;background:var(--green);border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center}
.hero-map-icon::after{content:'';width:18px;height:18px;background:#F5F3EE;border-radius:50%;transform:rotate(45deg)}
.hero-card-body{padding:1.75rem;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.hero-kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:.5rem}
.hero-title{font-size:1.5rem;font-weight:700;color:#F2EDE4;line-height:1.3;margin-bottom:.5rem}
.hero-sub{font-size:13px;color:#8A8780;line-height:1.6;margin-bottom:1rem}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.hero-tag{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.07);color:#aaa}
.hero-foot{display:flex;align-items:center;justify-content:space-between}
.hero-author{font-size:11px;color:#6A6860}
.hero-cta{font-size:13px;font-weight:500;color:var(--green);display:flex;align-items:center;gap:5px;transition:gap .15s}
.hero-card:hover .hero-cta{gap:9px}

/* Section headers */
.land-section{padding:2rem 0 0}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:.75rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.sec-title{font-size:.95rem;font-weight:600;color:var(--ink)}
.sec-more{font-size:13px;color:var(--green);cursor:pointer;border:none;background:transparent;font-family:inherit}

/* Editorial trips grid */
.ed-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.ed-card{display:flex;gap:12px;cursor:pointer;padding:1.1rem 0;border-bottom:1px solid var(--border);transition:all .15s}
.ed-card:hover .ed-title{color:var(--green)}
.ed-card:nth-child(odd){padding-inline-end:1.25rem;border-inline-end:1px solid var(--border)}
.ed-card:nth-child(even){padding-inline-start:1.25rem}
.ed-card:nth-last-child(-n+2){border-bottom:none}
.ed-thumb{width:84px;height:66px;border-radius:8px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.ed-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.ed-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;transition:color .15s}
.ed-dest{font-size:11px;color:var(--ink3);margin-top:2px}
.ed-meta{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.ed-tag{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--border);color:var(--ink3)}
.ed-days{font-size:10px;color:var(--ink3)}
.st-planning{background:var(--gold-dim);color:var(--gold);border-color:rgba(160,112,48,.2)}
.st-booked{background:var(--blue-dim);color:var(--blue);border-color:rgba(58,106,174,.2)}
.st-ongoing{background:var(--green-dim);color:var(--green);border-color:rgba(42,122,88,.2)}
.st-completed{background:var(--bg3);color:var(--ink3)}

/* CTA strip */
.land-cta{margin:2.5rem 0 3rem}
.cta-strip{background:var(--ink);border-radius:12px;padding:1.75rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.cta-text h3{font-size:1rem;font-weight:600;color:#F2EDE4;margin-bottom:4px}
.cta-text p{font-size:13px;color:#8A8780}
.cta-btns{display:flex;gap:8px;flex-shrink:0}
.cta-btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.cta-btn-ghost{background:transparent;color:#ccc;border:1px solid #3a3835}
.cta-btn-green{background:var(--green);color:#fff}

.empty-pub{padding:3rem 0;text-align:center;color:var(--ink3)}
.empty-pub h3{font-size:1.1rem;font-weight:600;color:var(--ink2);margin-bottom:.5rem}
.empty-pub p{font-size:13px;margin-bottom:1.25rem}

/* color thumb bgs */
.tb-blue{background:linear-gradient(135deg,#3A6AAE,#1A3A7A)}
.tb-green{background:linear-gradient(135deg,#2A7A58,#1A4A38)}
.tb-coral{background:linear-gradient(135deg,#B84838,#7A2818)}
.tb-gold{background:linear-gradient(135deg,#A07030,#6A4818)}
.tb-purple{background:linear-gradient(135deg,#6850AE,#382878)}

/* ══════════════════════════
   PUBLIC TRIP VIEW
══════════════════════════ */
#screen-public.active{display:flex;flex-direction:column}
.pub-hero{padding:2.5rem 0 2rem;border-bottom:1px solid var(--border)}
.pub-inner{max-width:720px;margin:0 auto;padding:0 2rem;width:100%}
.pub-back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;margin-bottom:1.5rem;transition:color .15s;padding:0}
.pub-back:hover{color:var(--ink)}
.pub-back svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.pub-title{font-size:clamp(1.6rem,4vw,2.5rem);font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:.75rem}
.pub-meta-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.pub-meta-item{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:4px}
.pub-meta-item svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}
.pub-sep{color:var(--border2)}
.pub-readonly{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
.pub-readonly svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}
.pub-main{max-width:720px;margin:0 auto;padding:2rem 2rem 5rem;width:100%}
.pub-notes-box{background:var(--bg3);border-inline-start:3px solid var(--border2);border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin-bottom:1.75rem;font-size:13px;color:var(--ink2);line-height:1.7}
[dir=rtl] .pub-notes-box{border-inline-start:3px solid var(--border2);border-radius:8px 0 0 8px}
.pub-notes-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:5px}

/* ══════════════════════════
   LOGIN
══════════════════════════ */
#screen-login{background:var(--bg)}
#screen-login.active{display:flex;flex-direction:column}
.login-body{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-wrap{width:100%;max-width:340px}
.login-logo-area{margin-bottom:1.75rem}
.login-logo{display:flex;align-items:baseline;gap:5px;cursor:pointer;width:fit-content;margin-bottom:4px}
.login-logo .logo-ar{font-size:1.3rem;font-weight:700;color:var(--ink)}
.login-logo .logo-dot{color:var(--ink3)}
.login-logo .logo-en{font-size:1rem;font-weight:300;color:var(--ink3)}
.login-sub{font-size:13px;color:var(--ink3)}
.login-back{font-size:12px;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.25rem;transition:color .15s;padding:0}
.login-back:hover{color:var(--green)}
.login-back svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.5rem;display:flex;flex-direction:column;gap:13px}
.login-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:7px;padding:2px}
.login-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--ink3);font-size:13px;font-weight:500;border-radius:5px;cursor:pointer;transition:all .15s;font-family:inherit}
.login-tab.active{background:var(--bg2);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.login-err{background:var(--red-dim);border:1px solid rgba(168,56,56,.2);border-radius:6px;padding:8px 11px;font-size:12px;color:var(--red);display:none}
.login-err.show{display:block}

/* ══════════════════════════
   DASHBOARD
══════════════════════════ */
#screen-dash.active{display:flex;flex-direction:column}
.dash-body{flex:1;padding:2.5rem 2rem;max-width:860px;margin:0 auto;width:100%}
.dash-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
.dash-heading{font-size:1.6rem;font-weight:700;color:var(--ink)}
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .18s;display:flex;flex-direction:column}
.tc:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.tc-accent{height:3px;flex-shrink:0}
.tc-body{padding:.9rem 1rem;flex:1;display:flex;flex-direction:column;gap:3px}
.tc-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35}
.tc-dest{font-size:11px;color:var(--ink3)}
.tc-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tc-chip{font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--border);color:var(--ink3)}
.tc-vis{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;margin-top:5px}
.tc-vis svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}
.tc-foot{padding:7px 1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tc-status{font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px}
.tc-acts{display:flex;gap:3px}
.empty-dash{text-align:center;padding:4rem 2rem;color:var(--ink3);grid-column:1/-1}
.empty-dash h3{font-size:1.2rem;font-weight:600;color:var(--ink2);margin-bottom:.5rem}
.empty-dash p{font-size:13px;margin-bottom:1.25rem}

/* ══════════════════════════
   EDITOR
══════════════════════════ */
#screen-editor.active{display:flex;flex-direction:column}
.ed-hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:10px;height:52px;position:sticky;top:0;z-index:100;flex-shrink:0}
.ed-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:color .15s}
.ed-back:hover{color:var(--ink)}
.ed-back svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.ed-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.ed-title{font-size:.95rem;font-weight:600;color:var(--ink);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-right{display:flex;gap:6px;flex-shrink:0}
.ed-main{flex:1;max-width:720px;margin:0 auto;padding:1.75rem 1.5rem 5rem;width:100%}
.trip-bar{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:.9rem 1.1rem;margin-bottom:1.5rem;display:flex;gap:2rem;flex-wrap:wrap}
.tb-item{display:flex;flex-direction:column;gap:2px}
.tb-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.tb-val{font-size:13px;color:var(--ink2);font-weight:500}
.tb-val.green{color:var(--green)}

/* DAYS */
.days-wrap{display:flex;flex-direction:column}
.day-row{display:flex;align-items:stretch;width:100%}
.day-row.dragging{opacity:.35}
.day-row.drag-over .day-card{border-color:var(--green)}
.tl{display:flex;flex-direction:column;align-items:center;padding-top:6px;width:40px;flex-shrink:0}
.tl-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;position:relative;z-index:1}
.tl-ln{width:1px;flex:1;min-height:20px;margin-top:3px;opacity:.25}
.day-col{flex:1;min-width:0;padding:0 0 1.4rem .65rem}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s;width:100%}
.day-hd{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.day-hd:hover{background:rgba(0,0,0,.018)}
.day-hd-l{flex:1;min-width:0}
.day-ttl{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.day-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.day-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.drive-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;background:var(--bg3);color:var(--ink3);border-radius:5px;border:1px solid var(--border)}
.drive-tag svg{width:10px;height:10px;stroke:var(--ink3);stroke-width:2;fill:none}
.reg-tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.day-hd-r{display:flex;align-items:center;gap:3px;flex-shrink:0;padding-top:1px}
.chev{width:14px;height:14px;stroke:var(--ink3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0}
.day-card.expanded .chev{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--border)}
.day-card.expanded .day-body{display:block}
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px 5px;gap:8px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.attrs{padding:0 13px 8px;display:flex;flex-direction:column;gap:4px}
.attr-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 9px;width:100%}
.attr-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.75}
.attr-ico svg{width:13px;height:13px;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.attr-info{flex:1;min-width:0}
.attr-nm{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attr-mt{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attr-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cost-b{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:500}
.b-free{background:var(--green-dim);color:var(--green);border:1px solid rgba(42,122,88,.2)}
.b-paid{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(160,112,48,.2)}
.map-btn{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;color:var(--green);text-decoration:none;background:var(--green-dim);border:1px solid rgba(42,122,88,.2);border-radius:5px;padding:2px 7px;transition:all .15s;font-family:inherit}
.map-btn svg{width:10px;height:10px;stroke:currentColor;stroke-width:2;fill:none}
.attr-acts{display:flex;gap:3px}
.callouts{padding:2px 13px 9px;display:flex;flex-direction:column;gap:4px}
.callout{border-radius:6px;padding:7px 10px;display:flex;gap:7px;align-items:flex-start;font-size:12px;line-height:1.55}
.callout svg{width:12px;height:12px;flex-shrink:0;margin-top:2px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.callout.gem{background:var(--green-dim);color:var(--green);border:1px solid rgba(42,122,88,.15)}
.callout.cost{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(160,112,48,.15)}
.callout.warn{background:var(--coral-dim);color:var(--coral);border:1px solid rgba(184,72,56,.15)}
.callout.dont{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(160,112,48,.2)}
.callout.car{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(58,106,174,.15)}
.callout-del{margin-inline-start:auto;flex-shrink:0}
.notes-sec{padding:7px 13px 13px;border-top:1px solid var(--border)}
.notes-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:6px}
.note-item{background:var(--bg3);border:1px solid var(--border);border-inline-start:2px solid var(--gold);border-radius:0 7px 7px 0;padding:7px 9px;margin-bottom:5px;font-size:12px;color:var(--ink2);display:flex;justify-content:space-between;gap:8px;align-items:flex-start;line-height:1.55}
[dir=rtl] .note-item{border-radius:7px 0 0 7px}
.note-txt{flex:1;white-space:pre-wrap;word-break:break-word}
.note-acts{display:flex;gap:3px;flex-shrink:0}
.empty-notes{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic}
.add-day-btn{display:flex;align-items:center;justify-content:center;gap:7px;border:1px dashed var(--border2);border-radius:10px;padding:11px;cursor:pointer;color:var(--ink3);font-size:13px;font-family:inherit;background:transparent;width:100%;margin-top:10px;transition:all .18s}
.add-day-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.add-day-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* region colors */
.r-cities .tl-num{background:var(--coral-dim);color:var(--coral)}.r-cities .tl-ln{background:var(--coral)}.r-cities .reg-tag{background:var(--coral-dim);color:var(--coral)}
.r-lakes .tl-num{background:var(--green-dim);color:var(--green)}.r-lakes .tl-ln{background:var(--green)}.r-lakes .reg-tag{background:var(--green-dim);color:var(--green)}
.r-dolomites .tl-num{background:var(--blue-dim);color:var(--blue)}.r-dolomites .tl-ln{background:var(--blue)}.r-dolomites .reg-tag{background:var(--blue-dim);color:var(--blue)}
.r-austria .tl-num{background:var(--purple-dim);color:var(--purple)}.r-austria .tl-ln{background:var(--purple)}.r-austria .reg-tag{background:var(--purple-dim);color:var(--purple)}
.r-transit .tl-num{background:var(--bg3);color:var(--ink3)}.r-transit .tl-ln{background:var(--border2)}.r-transit .reg-tag{background:var(--bg3);color:var(--ink3)}

/* accents */
.ac-blue{background:var(--blue)}.ac-green{background:var(--green)}.ac-coral{background:var(--coral)}.ac-gold{background:var(--gold)}.ac-purple{background:var(--purple)}

@media(max-width:640px){
  .land-inner,.ed-main,.pub-inner,.pub-main,.dash-body{padding-left:1rem;padding-right:1rem}
  .nav,.ed-hdr{padding:0}  .nav-inner{padding:0 1rem}
  .ed-grid,.trips-editorial{grid-template-columns:1fr}
  .ed-card:nth-child(odd){padding-inline-end:0;border-inline-end:none}
  .ed-card:nth-child(even){padding-inline-start:0}
  .ed-card:nth-last-child(-n+2){border-bottom:1px solid var(--border)}
  .ed-card:last-child{border-bottom:none}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .hero-card{flex-direction:column}.hero-card-img{width:100%;height:140px}
  .cta-strip{flex-direction:column;gap:1rem}
}
</style>
</head>

      <button class="btn btn-primary" onclick="showLogin()" data-k="get_started">ابدأ مجاناً</button>

</div>

<!-- ══ DASHBOARD ══ -->

<!-- ══ MODALS ══ -->
<div class="overlay" id="trip-modal">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title" id="trip-modal-title">رحلة جديدة</div><button class="act" onclick="closeModal('trip-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label data-k="lbl_title">الاسم</label><input type="text" id="t-title"></div><div class="field"><label data-k="lbl_dest">الوجهة</label><input type="text" id="t-dest"></div></div>
      <div class="form-row"><div class="field"><label data-k="lbl_start">البداية</label><input type="date" id="t-start"></div><div class="field"><label data-k="lbl_end">النهاية</label><input type="date" id="t-end"></div></div>
      <div class="form-row-3">
        <div class="field"><label data-k="lbl_budget">الميزانية</label><input type="number" id="t-budget" min="0"></div>
        <div class="field"><label data-k="lbl_currency">العملة</label><select id="t-currency"><option value="EUR">EUR €</option><option value="USD">USD $</option><option value="GBP">GBP £</option><option value="SAR">SAR ﷼</option><option value="AED">AED د.إ</option></select></div>
        <div class="field"><label data-k="lbl_color">اللون</label><select id="t-color"><option value="blue">أزرق</option><option value="green">أخضر</option><option value="coral">مرجاني</option><option value="gold">ذهبي</option><option value="purple">بنفسجي</option></select></div>
      </div>
      <div class="field"><label data-k="lbl_status">الحالة</label><select id="t-status"><option value="planning">تخطيط</option><option value="booked">محجوز</option><option value="ongoing">جارية</option><option value="completed">مكتملة</option></select></div>
      <div class="field"><label data-k="lbl_notes">ملاحظات</label><textarea id="t-notes" rows="3"></textarea></div>
      <div class="toggle-wrap"><label for="t-public" data-k="lbl_public">اجعل الرحلة عامة — يمكن لأي شخص عرضها</label><label class="toggle"><input type="checkbox" id="t-public"><span class="toggle-slider"></span></label></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal('trip-modal')" data-k="cancel">إلغاء</button><button class="btn btn-primary" onclick="saveTrip()" data-k="save">حفظ</button></div>
  </div>
</div>

let lang=localStorage.getItem('masar_lang')||'ar';
function tr(k){return(T[lang]&&T[lang][k])||T.ar[k]||k;}
function applyLang(){
  const ar=lang==='ar';
  document.documentElement.lang=lang;document.documentElement.dir=ar?'rtl':'ltr';
  document.body.style.fontFamily=ar?"'IBM Plex Sans Arabic',sans-serif":"'Fraunces','IBM Plex Sans Arabic',sans-serif";
  document.querySelectorAll('[data-k]').forEach(el=>{const k=el.getAttribute('data-k');if(T[lang]&&T[lang][k])el.textContent=T[lang][k];});
  document.getElementById('auth-btn-txt').textContent=activeTab==='login'?tr('sign_in'):tr('register');
  const ls=document.getElementById('login-sub-txt');if(ls)ls.textContent=tr('login_tagline');
  [['ll-ar','ll-en'],['login-l-ar','login-l-en'],['dash-l-ar','dash-l-en']].forEach(([a,e])=>{
    const ae=document.getElementById(a);const ee=document.getElementById(e);
    if(ae){ae.classList.toggle('active',lang==='ar');ee.classList.toggle('active',lang==='en');}
  });
  localStorage.setItem('masar_lang',lang);
}
function setLang(l){lang=l;applyLang();
  if(currentUser)fetch(`${API}/auth/lang`,{method:'PATCH',headers:aH(),body:JSON.stringify({lang:l})}).catch(()=>{});
}

// ── THEME ───────────────────────────────────────────────
let theme=localStorage.getItem('masar_theme')||'light';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',theme);
  const dark=theme==='dark';
  ['moon-land','moon-pub','moon-login','moon-dash'].forEach(id=>{const e=document.getElementById('ti-'+id);if(e)e.classList.toggle('hidden',!dark);});
  ['sun-land','sun-pub','sun-login','sun-dash'].forEach(id=>{const e=document.getElementById('ti-'+id);if(e)e.classList.toggle('hidden',dark);});
  localStorage.setItem('masar_theme',theme);
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';applyTheme();
  if(currentUser)fetch(`${API}/auth/theme`,{method:'PATCH',headers:aH(),body:JSON.stringify({theme})}).catch(()=>{});
}

// ── AUTH ────────────────────────────────────────────────
let token=localStorage.getItem('masar_token');
let currentUser=JSON.parse(localStorage.getItem('masar_user')||'null');
let activeTab='login';
function aH(){return{'Content-Type':'application/json','Authorization':`Bearer ${token}`};}
function showLogin(){showScreen('screen-login');}
function switchTab(tab){activeTab=tab;
  document.getElementById('tab-in').classList.toggle('active',tab==='login');
  document.getElementById('tab-reg').classList.toggle('active',tab==='register');
  document.getElementById('auth-btn-txt').textContent=tab==='login'?tr('sign_in'):tr('register');
  document.getElementById('login-err').classList.remove('show');
}
async function doAuth(){
  const user=document.getElementById('inp-user').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-err');
  if(!user||!pass){err.textContent=lang==='ar'?'يرجى ملء جميع الحقول':'Fill in all fields';err.classList.add('show');return;}
  document.getElementById('auth-btn').disabled=true;err.classList.remove('show');
  try{
    let res;
    if(activeTab==='login'){const f=new FormData();f.append('username',user);f.append('password',pass);res=await fetch(`${API}/auth/login`,{method:'POST',body:f});}
    else{res=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});}
    const d=await res.json();
    if(!res.ok){err.textContent=d.detail||(lang==='ar'?'حدث خطأ':'Error');err.classList.add('show');return;}
    token=d.access_token;
    const sl=localStorage.getItem('masar_lang');const st=localStorage.getItem('masar_theme');
    currentUser={id:d.user_id,username:d.username,lang:sl||d.lang,theme:st||d.theme||'light'};
    localStorage.setItem('masar_token',token);localStorage.setItem('masar_user',JSON.stringify(currentUser));
    lang=currentUser.lang;theme=currentUser.theme;applyTheme();applyLang();
    await showDash();
  }catch(e){err.textContent=lang==='ar'?'تعذّر الاتصال':'Cannot connect';err.classList.add('show');}
  finally{document.getElementById('auth-btn').disabled=false;}
}
function logout(){token=null;currentUser=null;currentTrip=null;trips=[];localStorage.removeItem('masar_token');localStorage.removeItem('masar_user');goLanding();}

// ── SCREENS ─────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});const el=document.getElementById(id);el.classList.add('active');el.style.display='flex';el.style.flexDirection='column';}
function goLanding(){showScreen('screen-landing');loadPubTrips();}
function goHome(){showDash();}
async function showDash(){showScreen('screen-dash');updateUserUI();await loadTrips();}
function updateUserUI(){if(!currentUser)return;document.getElementById('user-av').textContent=currentUser.username.slice(0,2).toUpperCase();document.getElementById('user-nm').textContent=currentUser.username;}

// ── PUBLIC TRIPS ─────────────────────────────────────────
let pubTrips=[];
const ACCS={blue:'ac-blue',green:'ac-green',coral:'ac-coral',gold:'ac-gold',purple:'ac-purple'};
const TBS={blue:'tb-blue',green:'tb-green',coral:'tb-coral',gold:'tb-gold',purple:'tb-purple'};

async function loadPubTrips(){
  try{const r=await fetch(`${API}/public/trips`);pubTrips=await r.json();renderPubTrips();}
  catch(e){console.warn('load failed',e);}
}

function renderPubTrips(){
  const grid=document.getElementById('pub-grid');
  const hero=document.getElementById('hero-card');
  if(!grid)return;
  if(pubTrips.length===0){
    hero.style.display='none';
    grid.innerHTML=`<div class="empty-pub" style="grid-column:1/-1"><h3>${tr('no_pub_h')}</h3><p>${tr('no_pub_p')}</p><button class="btn btn-primary" onclick="showLogin()">${tr('get_started')}</button></div>`;
    return;
  }
  hero.style.display='';
  const f=pubTrips[0];
  const fd=f.start_date&&f.end_date?`${f.start_date} → ${f.end_date}`:f.start_date||'';
  document.getElementById('hero-title').textContent=f.title;
  document.getElementById('hero-sub').textContent=(f.destination?(f.destination+' · '):'')+(f.notes||'').slice(0,80)+(f.notes&&f.notes.length>80?'...':'');
  document.getElementById('hero-author').textContent=tr('by')+' '+f.username+(fd?' · '+fd:'');
  document.getElementById('hero-tags').innerHTML=[
    f.day_count>0?`<span class="hero-tag">${f.day_count} ${tr('days_n')}</span>`:'',
    f.budget>0?`<span class="hero-tag">${Number(f.budget).toLocaleString()} ${h(f.currency)}</span>`:'',
    f.status?`<span class="hero-tag">${tr('s'+f.status[0])}</span>`:'',
  ].join('');
  hero.onclick=()=>openPubTrip(f.id);

  const rest=pubTrips.slice(1);
  grid.innerHTML=rest.map(t=>{
    const d=t.start_date&&t.end_date?`${t.start_date} → ${t.end_date}`:t.start_date||'';
    const sKey='s'+t.status[0];const sCls='st-'+t.status;
    return`<div class="ed-card" onclick="openPubTrip(${t.id})">
      <div class="ed-thumb ${TBS[t.color]||'tb-blue'}"></div>
      <div class="ed-info">
        <div><div class="ed-title">${h(t.title)}</div><div class="ed-dest">${h(t.destination||'')}</div></div>
        <div class="ed-meta">
          <span class="ed-tag ${sCls}">${tr(sKey)}</span>
          ${t.day_count>0?`<span class="ed-days">${t.day_count} ${tr('days_n')}</span>`:''}
          <span class="ed-days">· ${tr('by')} ${h(t.username)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function openPubTrip(id){
  showScreen('screen-public');
  document.getElementById('pub-days').innerHTML=`<div style="display:flex;justify-content:center;padding:3rem"><div class="spinner"></div></div>`;
  try{
    const r=await fetch(`${API}/public/trips/${id}`);
    if(!r.ok){toast(tr('not_found')||'Not found');goLanding();return;}
    const t=await r.json();
    document.getElementById('pub-title').textContent=t.title;
    const d=t.start_date&&t.end_date?`${t.start_date} → ${t.end_date}`:t.start_date||'';
    document.getElementById('pub-meta').innerHTML=`
      ${t.destination?`<span class="pub-meta-item">${ic('map')}<span>${h(t.destination)}</span></span><span class="pub-sep">·</span>`:''}
      ${d?`<span class="pub-meta-item">${ic('cal')}<span>${h(d)}</span></span><span class="pub-sep">·</span>`:''}
      ${t.budget>0?`<span class="pub-meta-item">${ic('money')}<span>${Number(t.budget).toLocaleString()} ${h(t.currency)}</span></span><span class="pub-sep">·</span>`:''}
      <span class="pub-meta-item"><span>${tr('by')} ${h(t.username)}</span></span>`;
    const nw=document.getElementById('pub-notes-wrap');
    nw.innerHTML=t.notes?`<div class="pub-notes-box"><div class="pub-notes-lbl">${tr('trip_notes')}</div>${h(t.notes)}</div>`:'';
    renderPubDays(t.days||[]);
  }catch(e){toast('Error');goLanding();}
}

function renderPubDays(days){
  const cont=document.getElementById('pub-days');cont.innerHTML='';
  const cI={gem:'gem',cost:'coin',warn:'clock',dont:'star',car:'car'};
  days.forEach(day=>{
    const reg='r-'+(day.region||'cities');
    const wrap=document.createElement('div');wrap.className='day-row';
    const attrs=(day.attractions||[]).map(a=>`<div class="attr-row">
      <div class="attr-ico">${ic('map')}</div>
      <div class="attr-info"><div class="attr-nm">${h(a.name)}</div><div class="attr-mt">${h(a.meta||'')}</div></div>
      <div class="attr-r"><span class="cost-b ${a.cost_type==='paid'?'b-paid':'b-free'}">${h(a.cost||'')}</span>
      ${a.maps_url?`<a class="map-btn" href="${h(a.maps_url)}" target="_blank" rel="noopener">${ic('map')}<span>${tr('open_maps')}</span></a>`:''}</div></div>`).join('');
    const calls=(day.callouts||[]).map(c=>`<div class="callout ${h(c.type)}">${ic(cI[c.type]||'star')}<span>${h(c.text)}</span></div>`).join('');
    const notes=(day.notes||[]).map(n=>`<div class="note-item"><div class="note-txt">${h(n.text)}</div></div>`).join('');
    wrap.innerHTML=`<div class="tl ${reg}"><div class="tl-num">${day.num}</div><div class="tl-ln"></div></div>
      <div class="day-col"><div class="day-card" id="pdc-${day.id}">
        <div class="day-hd" onclick="toggleCard('pdc-${day.id}')">
          <div class="day-hd-l"><div class="day-ttl">${h(day.title)}</div><div class="day-sub">${h(day.tagline||'')}</div>
            <div class="day-tags">${day.drive?`<div class="drive-tag">${ic('car')}<span>${h(day.drive)}</span></div>`:''}<span class="reg-tag ${reg}">${h(tr('r_'+(day.region||'cities')))}</span></div>
          </div>
          <div class="day-hd-r">${I.chev}</div>
        </div>
        <div class="day-body">
          ${attrs?`<div class="sec-row"><span class="sec-lbl">${tr('sec_attrs')}</span></div><div class="attrs">${attrs}</div>`:''}
          ${calls?`<div class="callouts">${calls}</div>`:''}
          ${day.dont_miss?`<div class="callouts"><div class="callout dont">${ic('star')}<span><strong>${tr('dont_miss')}</strong> ${h(day.dont_miss)}</span></div></div>`:''}
          ${notes?`<div class="notes-sec"><div class="notes-lbl">${tr('sec_notes')}</div>${notes}</div>`:''}
        </div>
      </div></div>`;
    cont.appendChild(wrap);
  });
}
function toggleCard(id){const c=document.getElementById(id);if(!c)return;const op=c.classList.contains('expanded');c.parentElement.parentElement.parentElement.querySelectorAll('.day-card').forEach(x=>x.classList.remove('expanded'));if(!op)c.classList.add('expanded');}

// ── DASHBOARD ────────────────────────────────────────────
let trips=[];let editingTripId=null;
const SC={planning:'st-planning',booked:'st-booked',ongoing:'st-ongoing',completed:'st-completed'};
const SP={planning:'sp',booked:'sb',ongoing:'so',completed:'sc'};

async function loadTrips(){
  const g=document.getElementById('trips-grid');
  g.innerHTML=`<div style="grid-column:1/-1;display:flex;justify-content:center;padding:3rem"><div class="spinner"></div></div>`;
  try{const r=await fetch(`${API}/trips`,{headers:aH()});if(r.status===401){logout();return;}trips=await r.json();renderGrid();}
  catch(e){g.innerHTML=`<div style="color:var(--ink3);padding:2rem">Error</div>`;}
}
function renderGrid(){
  const g=document.getElementById('trips-grid');
  if(trips.length===0){g.innerHTML=`<div class="empty-dash"><h3>${tr('no_trips_h')}</h3><p>${tr('no_trips_p')}</p><button class="btn btn-primary" onclick="openNewTrip()">${ic('plus')}<span>${tr('new_trip')}</span></button></div>`;return;}
  g.innerHTML=trips.map(t=>{
    const d=t.start_date&&t.end_date?`${t.start_date} → ${t.end_date}`:t.start_date||'';
    const b=t.budget>0?`${Number(t.budget).toLocaleString()} ${t.currency}`:'';
    const sl=tr(SP[t.status]||'sp');const sc=SC[t.status]||'';
    return`<div class="tc" onclick="openTrip(${t.id})">
      <div class="tc-accent ${ACCS[t.color]||'ac-blue'}"></div>
      <div class="tc-body">
        <div class="tc-title">${h(t.title)}</div>
        ${t.destination?`<div class="tc-dest">${h(t.destination)}</div>`:''}
        <div class="tc-chips">${d?`<span class="tc-chip">${h(d)}</span>`:''}${b?`<span class="tc-chip">${h(b)}</span>`:''}</div>
        <div class="tc-vis" style="color:${t.is_public?'var(--green)':'var(--ink3)'}">${t.is_public?ic('globe'):ic('lock')}<span>${t.is_public?tr('pub_lbl'):tr('priv_lbl')}</span></div>
      </div>
      <div class="tc-foot">
        <span class="tc-status ${sc}">${h(sl)}</span>
        <div class="tc-acts" onclick="event.stopPropagation()">
          ${ab('pencil',tr('edit'),`openEditTripD(${t.id})`)}${ab('trash',tr('del'),`delTripD(${t.id})`,true)}
        </div>
      </div>
    </div>`;
  }).join('');
}
function openNewTrip(){editingTripId=null;document.getElementById('trip-modal-title').textContent=tr('modal_new_trip');
  ['t-title','t-dest','t-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-start').value='';document.getElementById('t-end').value='';document.getElementById('t-budget').value='';
  document.getElementById('t-currency').value='EUR';document.getElementById('t-color').value='blue';document.getElementById('t-status').value='planning';document.getElementById('t-public').checked=false;
  openModal('trip-modal');
}
function openEditTripD(id){const t=trips.find(x=>x.id===id);if(!t)return;editingTripId=id;
  document.getElementById('trip-modal-title').textContent=tr('modal_edit_trip');
  document.getElementById('t-title').value=t.title;document.getElementById('t-dest').value=t.destination||'';
  document.getElementById('t-start').value=t.start_date||'';document.getElementById('t-end').value=t.end_date||'';
  document.getElementById('t-budget').value=t.budget||'';document.getElementById('t-currency').value=t.currency||'EUR';
  document.getElementById('t-color').value=t.color||'blue';document.getElementById('t-status').value=t.status||'planning';
  document.getElementById('t-notes').value=t.notes||'';document.getElementById('t-public').checked=!!t.is_public;
  openModal('trip-modal');
}
function openEditTrip(){if(currentTrip)openEditTripD(currentTrip.id);}
async function saveTrip(){
  const title=document.getElementById('t-title').value.trim();if(!title){toast(lang==='ar'?'يرجى إدخال عنوان':'Enter a title');return;}
  const body={title,destination:document.getElementById('t-dest').value.trim(),start_date:document.getElementById('t-start').value,end_date:document.getElementById('t-end').value,budget:parseFloat(document.getElementById('t-budget').value)||0,currency:document.getElementById('t-currency').value,color:document.getElementById('t-color').value,status:document.getElementById('t-status').value,notes:document.getElementById('t-notes').value.trim(),is_public:document.getElementById('t-public').checked};
  try{let r;
    if(editingTripId){r=await fetch(`${API}/trips/${editingTripId}`,{method:'PUT',headers:aH(),body:JSON.stringify(body)});const s=await r.json();if(currentTrip&&currentTrip.id===editingTripId){currentTrip=s;renderTripBar();document.getElementById('ed-trip-title').textContent=s.title;}trips=trips.map(t=>t.id===editingTripId?{...s,day_count:t.day_count}:t);}
    else{r=await fetch(`${API}/trips`,{method:'POST',headers:aH(),body:JSON.stringify(body)});const s=await r.json();trips.unshift({...s,day_count:0});}
    closeModal('trip-modal');renderGrid();toast(tr('saved'));
  }catch(e){toast('Error');}
}
async function delTripD(id){if(!confirm(tr('del')+'?'))return;
  try{await fetch(`${API}/trips/${id}`,{method:'DELETE',headers:aH()});trips=trips.filter(t=>t.id!==id);renderGrid();toast(tr('deleted'));}catch(e){toast('Error');}
}

// ── EDITOR ───────────────────────────────────────────────
let currentTrip=null;let currentDays=[];
let editDayId=null,editAttrId=null,editAttrDayId=null,activeNoteDay=null,editNoteIdx=null,dragSrc=null;

async function openTrip(id){const t=trips.find(x=>x.id===id);if(!t)return;currentTrip=t;document.getElementById('ed-trip-title').textContent=t.title;showScreen('screen-editor');renderTripBar();await loadDays();}
function renderTripBar(){const t=currentTrip;const bar=document.getElementById('trip-bar');
  const d=t.start_date&&t.end_date?`${t.start_date} → ${t.end_date}`:t.start_date||'—';
  const b=t.budget>0?`${Number(t.budget).toLocaleString()} ${t.currency}`:'—';
  bar.innerHTML=`${t.destination?`<div class="tb-item"><div class="tb-lbl">${tr('dest_lbl')}</div><div class="tb-val">${h(t.destination)}</div></div>`:''}<div class="tb-item"><div class="tb-lbl">${tr('dates_lbl')}</div><div class="tb-val">${h(d)}</div></div><div class="tb-item"><div class="tb-lbl">${tr('budget_lbl')}</div><div class="tb-val green">${h(b)}</div></div><div class="tb-item"><div class="tb-lbl">${tr('vis_lbl')}</div><div class="tb-val" style="color:${t.is_public?'var(--green)':'var(--ink3)'}">${t.is_public?'🌍 '+tr('pub_lbl'):'🔒 '+tr('priv_lbl')}</div></div>`;
}
async function loadDays(){const c=document.getElementById('days-wrap');c.innerHTML=`<div style="display:flex;justify-content:center;padding:2rem"><div class="spinner"></div></div>`;
  try{const r=await fetch(`${API}/trips/${currentTrip.id}/days`,{headers:aH()});currentDays=await r.json();renderDays();}
  catch(e){document.getElementById('days-wrap').innerHTML='<div style="color:var(--ink3)">Error</div>';}
}
function renderDays(){
  const cont=document.getElementById('days-wrap');cont.innerHTML='';
  const cI={gem:'gem',cost:'coin',warn:'clock',dont:'star',car:'car'};
  currentDays.forEach((day,idx)=>{
    const reg='r-'+(day.region||'cities');
    const wrap=document.createElement('div');wrap.className='day-row';wrap.draggable=true;wrap.dataset.idx=idx;
    const attrs=(day.attractions||[]).map(a=>`<div class="attr-row">
      <div class="attr-ico">${ic('map')}</div>
      <div class="attr-info"><div class="attr-nm">${h(a.name)}</div><div class="attr-mt">${h(a.meta||'')}</div></div>
      <div class="attr-r"><span class="cost-b ${a.cost_type==='paid'?'b-paid':'b-free'}">${h(a.cost||'')}</span>
        ${a.maps_url?`<a class="map-btn" href="${h(a.maps_url)}" target="_blank" rel="noopener">${ic('map')}<span>${tr('open_maps')}</span></a>`:''}
        <div class="attr-acts">${ab('pencil',tr('edit'),`openEditAttr(${day.id},${a.id})`)}${ab('trash',tr('del'),`deleteAttr(${day.id},${a.id})`,true)}</div>
      </div></div>`).join('');
    const calls=(day.callouts||[]).map(c=>`<div class="callout ${h(c.type)}">${ic(cI[c.type]||'star')}<span>${h(c.text)}</span><button class="act danger callout-del" onclick="deleteCallout(${day.id},${c.id})">${I.trash}</button></div>`).join('');
    const notes=(day.notes||[]).length===0?`<div class="empty-notes">${tr('no_notes')}</div>`:(day.notes||[]).map((n,ni)=>`<div class="note-item"><div class="note-txt">${h(n.text)}</div><div class="note-acts">${ab('pencil',tr('edit'),`openEditNote(${day.id},${ni})`)}${ab('trash',tr('del'),`deleteNote(${day.id},${n.id})`,true)}</div></div>`).join('');
    wrap.innerHTML=`<div class="tl ${reg}"><div class="tl-num">${day.num}</div><div class="tl-ln"></div></div>
      <div class="day-col"><div class="day-card" id="dc-${day.id}">
        <div class="day-hd" onclick="toggleCard('dc-${day.id}')">
          <div class="day-hd-l"><div class="day-ttl">${h(day.title)}</div><div class="day-sub">${h(day.tagline||'')}</div>
            <div class="day-tags">${day.drive?`<div class="drive-tag">${ic('car')}<span>${h(day.drive)}</span></div>`:''}<span class="reg-tag ${reg}">${h(tr('r_'+(day.region||'cities')))}</span></div>
          </div>
          <div class="day-hd-r">
            ${ab('up',tr('move_up'),`moveDay(${idx},-1)`)}${ab('dn',tr('move_dn'),`moveDay(${idx},1)`)}
            ${ab('pencil',tr('edit'),`openEditDay(${day.id})`)}${ab('trash',tr('del'),`deleteDay(${day.id})`,true)}
            ${I.chev}
          </div>
        </div>
        <div class="day-body">
          <div class="sec-row"><span class="sec-lbl">${tr('sec_attrs')}</span><button class="btn btn-sm" onclick="openAddAttr(${day.id})">${I.plus}<span>${tr('add_attr')}</span></button></div>
          <div class="attrs">${attrs}</div>
          ${calls?`<div class="callouts">${calls}</div>`:''}
          ${day.dont_miss?`<div class="callouts"><div class="callout dont">${ic('star')}<span><strong>${tr('dont_miss')}</strong> ${h(day.dont_miss)}</span></div></div>`:''}
          <div class="notes-sec"><div class="notes-lbl">${tr('sec_notes')}</div>${notes}<button class="btn btn-sm" style="margin-top:5px" onclick="openAddNote(${day.id})">${I.plus}<span>${tr('add_note_btn')}</span></button></div>
        </div>
      </div></div>`;
    wrap.addEventListener('dragstart',e=>{dragSrc=idx;wrap.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    wrap.addEventListener('dragend',()=>document.querySelectorAll('.day-row').forEach(w=>w.classList.remove('dragging','drag-over')));
    wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('drag-over');});
    wrap.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
    wrap.addEventListener('drop',e=>{e.preventDefault();wrap.classList.remove('drag-over');if(dragSrc!==null&&dragSrc!==idx){const m=currentDays.splice(dragSrc,1)[0];currentDays.splice(idx,0,m);reorderDays();renderDays();}});
    cont.appendChild(wrap);
  });
}
function reopen(id){setTimeout(()=>{const c=document.getElementById('dc-'+id);if(c)c.classList.add('expanded');},50);}
function renumDays(){currentDays.forEach((d,i)=>d.num=i+1);}
async function moveDay(idx,dir){const to=idx+dir;if(to<0||to>=currentDays.length)return;[currentDays[idx],currentDays[to]]=[currentDays[to],currentDays[idx]];renumDays();await reorderDays();renderDays();}
async function reorderDays(){try{await fetch(`${API}/trips/${currentTrip.id}/days/reorder`,{method:'POST',headers:aH(),body:JSON.stringify({ids:currentDays.map(d=>d.id)})});}catch(e){}}
function openAddDay(){editDayId=null;document.getElementById('day-modal-title').textContent=tr('modal_add_day');['d-title','d-tagline','d-drive','d-dontmiss'].forEach(id=>document.getElementById(id).value='');document.getElementById('d-region').value='cities';openModal('day-modal');}
function openEditDay(id){const d=currentDays.find(x=>x.id===id);if(!d)return;editDayId=id;document.getElementById('day-modal-title').textContent=tr('modal_edit_day');document.getElementById('d-title').value=d.title;document.getElementById('d-tagline').value=d.tagline||'';document.getElementById('d-region').value=d.region||'cities';document.getElementById('d-drive').value=d.drive||'';document.getElementById('d-dontmiss').value=d.dont_miss||'';openModal('day-modal');}
async function saveDay(){const title=document.getElementById('d-title').value.trim();if(!title)return;
  const body={num:editDayId?currentDays.find(d=>d.id===editDayId)?.num:currentDays.length+1,title,tagline:document.getElementById('d-tagline').value.trim(),region:document.getElementById('d-region').value,drive:document.getElementById('d-drive').value.trim(),dont_miss:document.getElementById('d-dontmiss').value.trim(),position:editDayId?currentDays.find(d=>d.id===editDayId)?.position:currentDays.length};
  try{let r;if(editDayId){r=await fetch(`${API}/trips/${currentTrip.id}/days/${editDayId}`,{method:'PUT',headers:aH(),body:JSON.stringify(body)});if(r.ok){const i=currentDays.findIndex(d=>d.id===editDayId);currentDays[i]={...currentDays[i],...body};}}else{r=await fetch(`${API}/trips/${currentTrip.id}/days`,{method:'POST',headers:aH(),body:JSON.stringify(body)});if(r.ok){const nd=await r.json();nd.attractions=[];nd.notes=[];nd.callouts=[];currentDays.push(nd);}}
  closeModal('day-modal');renderDays();toast(tr('saved'));if(editDayId)reopen(editDayId);}catch(e){toast('Error');}
}
async function deleteDay(id){if(!confirm(tr('del')+'?'))return;try{await fetch(`${API}/trips/${currentTrip.id}/days/${id}`,{method:'DELETE',headers:aH()});currentDays=currentDays.filter(d=>d.id!==id);renumDays();renderDays();toast(tr('deleted'));}catch(e){toast('Error');}}
function openAddAttr(did){editAttrId=null;editAttrDayId=did;document.getElementById('attr-modal-title').textContent=tr('modal_add_attr');['a-name','a-meta','a-cost','a-maps'].forEach(id=>document.getElementById(id).value='');document.getElementById('a-cost-type').value='free';openModal('attr-modal');}
function openEditAttr(did,aid){const d=currentDays.find(x=>x.id===did);const a=d?.attractions.find(x=>x.id===aid);if(!a)return;editAttrId=aid;editAttrDayId=did;document.getElementById('attr-modal-title').textContent=tr('modal_edit_attr');document.getElementById('a-name').value=a.name;document.getElementById('a-meta').value=a.meta||'';document.getElementById('a-cost').value=a.cost||'';document.getElementById('a-cost-type').value=a.cost_type||'free';document.getElementById('a-maps').value=a.maps_url||'';openModal('attr-modal');}
async function saveAttr(){const name=document.getElementById('a-name').value.trim();if(!name)return;const d=currentDays.find(x=>x.id===editAttrDayId);const body={name,meta:document.getElementById('a-meta').value.trim(),cost:document.getElementById('a-cost').value.trim(),cost_type:document.getElementById('a-cost-type').value,maps_url:document.getElementById('a-maps').value.trim(),icon:'map'};
  try{let r;if(editAttrId){r=await fetch(`${API}/trips/${currentTrip.id}/days/${editAttrDayId}/attractions/${editAttrId}`,{method:'PUT',headers:aH(),body:JSON.stringify({...body,position:d.attractions.find(a=>a.id===editAttrId)?.position||0})});if(r.ok){const i=d.attractions.findIndex(a=>a.id===editAttrId);d.attractions[i]={...d.attractions[i],...body};}}else{r=await fetch(`${API}/trips/${currentTrip.id}/days/${editAttrDayId}/attractions`,{method:'POST',headers:aH(),body:JSON.stringify(body)});if(r.ok){const na=await r.json();d.attractions.push(na);}}
  closeModal('attr-modal');renderDays();toast(tr('saved'));reopen(editAttrDayId);}catch(e){toast('Error');}
}
async function deleteAttr(did,aid){const d=currentDays.find(x=>x.id===did);try{await fetch(`${API}/trips/${currentTrip.id}/days/${did}/attractions/${aid}`,{method:'DELETE',headers:aH()});d.attractions=d.attractions.filter(a=>a.id!==aid);renderDays();toast(tr('deleted'));reopen(did);}catch(e){toast('Error');}}
function openAddNote(did){activeNoteDay=did;editNoteIdx=null;document.getElementById('n-text').value='';openModal('note-modal');}
function openEditNote(did,idx){activeNoteDay=did;editNoteIdx=idx;document.getElementById('n-text').value=currentDays.find(d=>d.id===did).notes[idx].text;openModal('note-modal');}
async function saveNote(){const text=document.getElementById('n-text').value.trim();if(!text)return;const d=currentDays.find(x=>x.id===activeNoteDay);
  try{if(editNoteIdx!==null){const n=d.notes[editNoteIdx];await fetch(`${API}/trips/${currentTrip.id}/days/${activeNoteDay}/notes/${n.id}`,{method:'PUT',headers:aH(),body:JSON.stringify({text,position:n.position||0})});d.notes[editNoteIdx].text=text;}else{const r=await fetch(`${API}/trips/${currentTrip.id}/days/${activeNoteDay}/notes`,{method:'POST',headers:aH(),body:JSON.stringify({text})});if(r.ok){const nn=await r.json();d.notes.push(nn);}}
  closeModal('note-modal');renderDays();toast(tr('saved'));reopen(activeNoteDay);}catch(e){toast('Error');}
}
async function deleteNote(did,nid){const d=currentDays.find(x=>x.id===did);try{await fetch(`${API}/trips/${currentTrip.id}/days/${did}/notes/${nid}`,{method:'DELETE',headers:aH()});d.notes=d.notes.filter(n=>n.id!==nid);renderDays();toast(tr('deleted'));reopen(did);}catch(e){toast('Error');}}
async function deleteCallout(did,cid){const d=currentDays.find(x=>x.id===did);try{await fetch(`${API}/trips/${currentTrip.id}/days/${did}/callouts/${cid}`,{method:'DELETE',headers:aH()});d.callouts=d.callouts.filter(c=>c.id!==cid);renderDays();toast(tr('deleted'));reopen(did);}catch(e){toast('Error');}}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
let _tt;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200);}

// ── INIT ────────────────────────────────────────────────
if(currentUser){lang=currentUser.lang||lang;theme=currentUser.theme||theme;}
applyTheme();applyLang();
if(token&&currentUser){showDash();}else{goLanding();}
</script>
