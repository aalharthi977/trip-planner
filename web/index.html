<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0E0C;--bg2:#171614;--bg3:#1E1C19;--bg4:#252320;
  --card:#1C1A17;--border:#2E2B27;--border2:#3A3732;
  --ink:#F0EDE6;--ink2:#B8B4AC;--ink3:#6A6660;
  --green:#4CAF82;--green-dk:#2D7A57;--green-dim:rgba(76,175,130,0.13);
  --gold:#C8953A;--gold-dim:rgba(200,149,58,0.13);
  --coral:#C96048;--coral-dim:rgba(201,96,72,0.13);
  --blue:#5B8FD4;--blue-dim:rgba(91,143,212,0.13);
  --purple:#8B72D4;--purple-dim:rgba(139,114,212,0.13);
  --red:#D45B5B;--red-dim:rgba(212,91,91,0.13);
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 2px 8px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans','Noto Sans Arabic',sans-serif;font-size:14px;line-height:1.65;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── UTILS ── */
.hidden{display:none!important}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease both}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 16px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--ink2);transition:all 0.15s;font-family:inherit;white-space:nowrap;letter-spacing:0.01em}
.btn:hover{background:var(--bg4);color:var(--ink)}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn-green{background:var(--green);color:#081A10;border-color:var(--green);font-weight:500}
.btn-green:hover{background:#5DC494;border-color:#5DC494}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--bg3)}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:rgba(212,91,91,0.25)}
.btn-danger:hover{background:rgba(212,91,91,0.22)}
.btn svg{width:15px;height:15px;flex-shrink:0;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-sm svg{width:13px;height:13px}
.act{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;padding:0}
.act svg{width:14px;height:14px;stroke:var(--ink3);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.act:hover{background:var(--bg4);border-color:var(--border2)}.act:hover svg{stroke:var(--ink)}
.act.danger:hover{background:var(--red-dim);border-color:var(--red)}.act.danger:hover svg{stroke:var(--red)}

/* ── FORMS ── */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:0.09em}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--ink);outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(76,175,130,0.1)}
select option{background:var(--bg3);color:var(--ink)}
textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);width:100%;max-width:520px;box-shadow:var(--shadow-lg);max-height:92vh;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:300;color:var(--ink)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;inset-inline-end:1.5rem;z-index:999;background:var(--bg4);border:1px solid var(--border2);color:var(--ink);padding:10px 18px;border-radius:var(--r);font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(14px);opacity:0;transition:all 0.25s;pointer-events:none;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}

/* ══════════════════════════════
   LOGIN SCREEN
══════════════════════════════ */
#screen-login{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem}
#screen-login.active{display:flex}
.login-box{width:100%;max-width:380px}
.login-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;color:var(--ink);margin-bottom:0.25rem}
.login-logo em{color:var(--green);font-style:italic}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:2rem}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2rem;display:flex;flex-direction:column;gap:16px}
.login-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:4px}
.login-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--ink3);font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;transition:all 0.15s;font-family:inherit}
.login-tab.active{background:var(--bg4);color:var(--ink)}
.login-err{background:var(--red-dim);border:1px solid rgba(212,91,91,0.25);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--red);display:none}
.login-err.show{display:block}

/* ══════════════════════════════
   DASHBOARD SCREEN
══════════════════════════════ */
#screen-dash.active{display:flex;flex-direction:column;min-height:100vh}
.dash-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.dash-logo{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;color:var(--ink);cursor:pointer}
.dash-logo em{color:var(--green);font-style:italic}
.dash-hdr-right{display:flex;align-items:center;gap:8px}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(76,175,130,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--green)}
.user-name{font-size:12px;color:var(--ink2)}
.dash-main{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}
.dash-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.dash-heading{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:300;color:var(--ink)}
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column}
.trip-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.trip-card-top{height:6px;flex-shrink:0}
.trip-card-body{padding:1.1rem;flex:1;display:flex;flex-direction:column;gap:6px}
.trip-card-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:300;color:var(--ink);line-height:1.3}
.trip-card-dest{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}
.trip-card-dest svg{width:12px;height:12px;stroke:var(--ink3);stroke-width:2;fill:none;flex-shrink:0}
.trip-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.trip-meta-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ink3);background:var(--bg3);border-radius:8px;padding:3px 8px}
.trip-meta-pill svg{width:10px;height:10px;stroke:var(--ink3);stroke-width:2;fill:none}
.trip-card-footer{padding:10px 1.1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.trip-status{font-size:10px;font-weight:500;padding:2px 8px;border-radius:8px}
.status-planning{background:var(--gold-dim);color:var(--gold)}
.status-booked{background:var(--blue-dim);color:var(--blue)}
.status-ongoing{background:var(--green-dim);color:var(--green)}
.status-completed{background:rgba(255,255,255,0.05);color:var(--ink3)}
.trip-card-actions{display:flex;gap:4px}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--ink3)}
.empty-state svg{width:48px;height:48px;stroke:var(--border2);stroke-width:1;fill:none;margin:0 auto 1rem;display:block}
.empty-state h3{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;color:var(--ink2);margin-bottom:0.5rem}
.empty-state p{font-size:13px;margin-bottom:1.5rem}

/* trip color bars */
.color-blue .trip-card-top{background:var(--blue)}
.color-green .trip-card-top{background:var(--green)}
.color-coral .trip-card-top{background:var(--coral)}
.color-gold .trip-card-top{background:var(--gold)}
.color-purple .trip-card-top{background:var(--purple)}

/* ══════════════════════════════
   TRIP EDITOR SCREEN
══════════════════════════════ */
#screen-editor.active{display:flex;flex-direction:column;min-height:100vh}
.editor-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;padding:4px 0;transition:color 0.15s}
.back-btn:hover{color:var(--ink)}
.back-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.editor-hdr-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
.editor-trip-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;color:var(--ink);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.editor-hdr-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.editor-main{flex:1;max-width:820px;margin:0 auto;padding:1.8rem 1.5rem 4rem;width:100%}

/* trip info bar */
.trip-info-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center}
.trip-info-item{display:flex;flex-direction:column;gap:2px}
.trip-info-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);font-weight:400}
.trip-info-val{font-size:13px;color:var(--ink2);font-weight:500}
.trip-info-budget{color:var(--green)}

/* days */
.days-container{display:flex;flex-direction:column}
.day-wrap{display:flex;align-items:stretch;width:100%}
.day-wrap.dragging{opacity:0.35}
.day-wrap.drag-over .day-card{border-color:var(--green);box-shadow:0 0 0 1px var(--green-dk)}
.tl-col{display:flex;flex-direction:column;align-items:center;padding-top:7px;width:44px;flex-shrink:0}
.day-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;position:relative;z-index:1;font-family:'Fraunces',serif}
.tl-line{width:1px;flex:1;min-height:20px;margin-top:4px;opacity:0.35}
.day-content-col{flex:1;min-width:0;padding:0 0 1.6rem 0.7rem}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color 0.18s;width:100%}
.day-head{padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.day-head:hover{background:rgba(255,255,255,0.018)}
.day-head-left{flex:1;min-width:0}
.day-title-txt{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;color:var(--ink);line-height:1.3}
.day-sub-txt{font-size:12px;color:var(--ink3);margin-top:3px}
.day-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center}
.drive-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;background:rgba(255,255,255,0.04);color:var(--ink3);border-radius:7px;border:1px solid var(--border)}
.drive-tag svg{width:10px;height:10px;stroke:var(--ink3);stroke-width:2;fill:none}
.region-tag{font-size:10px;padding:2px 9px;border-radius:7px;font-weight:500}
.day-head-right{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:1px}
.chevron-svg{width:16px;height:16px;stroke:var(--ink3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s;flex-shrink:0}
.day-card.expanded .chevron-svg{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--border)}
.day-card.expanded .day-body{display:block}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 7px;gap:8px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--ink3)}
.attrs-list{padding:0 14px 8px;display:flex;flex-direction:column;gap:5px}
.attr-row{display:flex;align-items:center;gap:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;transition:border-color 0.15s;width:100%}
.attr-row:hover{border-color:var(--border2)}
.attr-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.attr-ico svg{width:14px;height:14px;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.attr-info{flex:1;min-width:0}
.attr-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attr-meta{font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cost-badge{font-size:10px;padding:2px 7px;border-radius:6px;white-space:nowrap;font-weight:500}
.free{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,130,0.2)}
.paid{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(200,149,58,0.2)}
.map-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--green);text-decoration:none;background:var(--green-dim);border:1px solid rgba(76,175,130,0.2);border-radius:6px;padding:3px 8px;white-space:nowrap;transition:all 0.15s;font-family:inherit}
.map-btn:hover{background:rgba(76,175,130,0.22)}
.map-btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.attr-acts{display:flex;gap:3px}
.callouts{padding:2px 14px 10px;display:flex;flex-direction:column;gap:5px}
.callout{border-radius:7px;padding:9px 12px;display:flex;gap:9px;align-items:flex-start;font-size:12.5px;line-height:1.55}
.callout svg{width:13px;height:13px;flex-shrink:0;margin-top:2px;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.callout.gem{background:var(--green-dim);color:#8EDCB4;border:1px solid rgba(76,175,130,0.15)}.callout.gem svg{stroke:var(--green)}
.callout.cost{background:var(--gold-dim);color:#D4A85A;border:1px solid rgba(200,149,58,0.15)}.callout.cost svg{stroke:var(--gold)}
.callout.warn{background:var(--coral-dim);color:#D4806A;border:1px solid rgba(201,96,72,0.15)}.callout.warn svg{stroke:var(--coral)}
.callout.dont{background:rgba(200,149,58,0.08);color:#D4A85A;border:1px solid rgba(200,149,58,0.2)}.callout.dont svg{stroke:var(--gold)}
.callout.car{background:var(--blue-dim);color:#84AADC;border:1px solid rgba(91,143,212,0.15)}.callout.car svg{stroke:var(--blue)}
.callout-del{margin-inline-start:auto;flex-shrink:0}
.notes-sec{padding:8px 14px 14px;border-top:1px solid var(--border)}
.notes-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.11em;color:var(--ink3);margin-bottom:8px}
.note-item{background:var(--bg3);border:1px solid var(--border);border-inline-start:2px solid var(--gold);border-radius:0 7px 7px 0;padding:8px 10px;margin-bottom:6px;font-size:12.5px;color:var(--ink2);display:flex;justify-content:space-between;gap:8px;align-items:flex-start;line-height:1.55}
[dir=rtl] .note-item{border-inline-start:2px solid var(--gold);border-radius:7px 0 0 7px}
.note-txt{flex:1;white-space:pre-wrap;word-break:break-word}
.note-acts{display:flex;gap:3px;flex-shrink:0}
.empty-notes{font-size:12px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.add-day-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed var(--border2);border-radius:var(--r-lg);padding:13px;cursor:pointer;color:var(--ink3);font-size:13px;font-family:inherit;background:transparent;width:100%;margin-top:10px;transition:all 0.18s}
.add-day-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.add-day-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── REGION COLORS ── */
.reg-cities .day-num{background:var(--coral-dim);color:var(--coral)}
.reg-cities .tl-line{background:var(--coral)}
.reg-cities .region-tag{background:var(--coral-dim);color:var(--coral)}
.reg-lakes .day-num{background:var(--green-dim);color:var(--green)}
.reg-lakes .tl-line{background:var(--green)}
.reg-lakes .region-tag{background:var(--green-dim);color:var(--green)}
.reg-dolomites .day-num{background:var(--blue-dim);color:var(--blue)}
.reg-dolomites .tl-line{background:var(--blue)}
.reg-dolomites .region-tag{background:var(--blue-dim);color:var(--blue)}
.reg-austria .day-num{background:var(--purple-dim);color:var(--purple)}
.reg-austria .tl-line{background:var(--purple)}
.reg-austria .region-tag{background:var(--purple-dim);color:var(--purple)}
.reg-transit .day-num{background:rgba(255,255,255,0.05);color:var(--ink3)}
.reg-transit .tl-line{background:var(--border2)}
.reg-transit .region-tag{background:rgba(255,255,255,0.05);color:var(--ink3)}

/* ── LANG TOGGLE ── */
.lang-toggle{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px}
.lang-opt{padding:5px 10px;border:none;background:transparent;color:var(--ink3);font-size:12px;font-weight:500;border-radius:5px;cursor:pointer;transition:all 0.15s;font-family:inherit}
.lang-opt.active{background:var(--bg4);color:var(--ink)}

@media(max-width:600px){
  .dash-hdr{padding:1rem}
  .dash-main{padding:1rem 1rem 3rem}
  .trips-grid{grid-template-columns:1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .editor-hdr{padding:0.9rem 1rem}
  .editor-main{padding:1rem 0.75rem 3rem}
}
@media print{

let lang = localStorage.getItem('tp_lang') || 'en';
function tr(k){return(T[lang]&&T[lang][k])||T.en[k]||k;}
function applyLang(){
  const ar = lang==='ar';
  document.documentElement.lang = lang;
  document.documentElement.dir = ar ? 'rtl' : 'ltr';
  document.body.style.fontFamily = ar ? "'Noto Sans Arabic','DM Sans',sans-serif" : "'DM Sans','Noto Sans Arabic',sans-serif";
  document.querySelectorAll('[data-k]').forEach(el=>{ const k=el.getAttribute('data-k'); if(T[lang][k]) el.textContent=T[lang][k]; });
  document.getElementById('tab-login').textContent = tr('sign_in');
  document.getElementById('tab-register').textContent = tr('register');
  document.getElementById('auth-btn-txt').textContent = activeTab==='login'?tr('sign_in'):tr('register');
  document.getElementById('lbl-username').textContent = tr('lbl_username');
  document.getElementById('lbl-password').textContent = tr('lbl_password');
  document.getElementById('login-sub').textContent = tr('login_tagline');
  ['lang-en','lang-en-ed'].forEach(id=>{ const el=document.getElementById(id); if(el){el.classList.toggle('active',lang==='en');} });
  ['lang-ar','lang-ar-ed'].forEach(id=>{ const el=document.getElementById(id); if(el){el.classList.toggle('active',lang==='ar');} });
  localStorage.setItem('tp_lang', lang);
}
function setLang(l){
  lang = l;
  applyLang();
  if(currentUser) {
    fetch(`${API}/auth/lang`,{method:'PATCH',headers:authHeaders(),body:JSON.stringify({lang:l})}).catch(()=>{});
  }
  if(currentTrip) renderDays();
  renderTripsGrid();
}

// ══ AUTH STATE ══════════════════════════════════════════
let token = localStorage.getItem('tp_token');
let currentUser = JSON.parse(localStorage.getItem('tp_user')||'null');
let activeTab = 'login';

function authHeaders(){return{'Content-Type':'application/json','Authorization':`Bearer ${token}`};}

function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('auth-btn-txt').textContent = tab==='login'?tr('sign_in'):tr('register');
  document.getElementById('login-err').classList.remove('show');
}

async function doAuth(){
  const username = document.getElementById('inp-username').value.trim();
  const password = document.getElementById('inp-password').value;
  const errEl = document.getElementById('login-err');
  if(!username||!password){ errEl.textContent=lang==='ar'?'يرجى ملء جميع الحقول':'Please fill in all fields'; errEl.classList.add('show'); return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  errEl.classList.remove('show');
  try{
    let res, data;
    if(activeTab==='login'){
      const form = new FormData();
      form.append('username',username); form.append('password',password);
      res = await fetch(`${API}/auth/login`,{method:'POST',body:form});
    } else {
      res = await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    }
    data = await res.json();
    if(!res.ok){ errEl.textContent=data.detail||(lang==='ar'?'حدث خطأ':'An error occurred'); errEl.classList.add('show'); return; }
    token = data.access_token;
    currentUser = {id:data.user_id, username:data.username, lang:data.lang};
    localStorage.setItem('tp_token', token);
    localStorage.setItem('tp_user', JSON.stringify(currentUser));
    lang = data.lang || lang;
    applyLang();
    await showDash();
  } catch(e){ errEl.textContent=lang==='ar'?'تعذّر الاتصال بالخادم':'Cannot connect to server'; errEl.classList.add('show'); }
  finally{ btn.disabled=false; }
}

function logout(){
  token=null; currentUser=null; currentTrip=null; trips=[];
  localStorage.removeItem('tp_token'); localStorage.removeItem('tp_user');
  showScreen('screen-login');
}

// ══ SCREEN MANAGEMENT ═══════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById(id);
  el.classList.add('active');
  el.style.display=(id==='screen-login')?'flex':'flex';
}
async function showDash(){
  showScreen('screen-dash');
  updateUserUI();
  await loadTrips();
}
function goHome(){ showDash(); }

function updateUserUI(){
  if(!currentUser) return;
  const initials = currentUser.username.slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-lbl').textContent = currentUser.username;
}

// ══ TRIPS ════════════════════════════════════════════════
let trips = [];
let editingTripId = null;

const COLORS = {
  blue:{bar:'var(--blue)'},green:{bar:'var(--green)'},
  coral:{bar:'var(--coral)'},gold:{bar:'var(--gold)'},purple:{bar:'var(--purple)'}
};
const STATUS_CLASS = {planning:'status-planning',booked:'status-booked',ongoing:'status-ongoing',completed:'status-completed'};

async function loadTrips(){
  const grid = document.getElementById('trips-grid');
  grid.innerHTML = `<div style="grid-column:1/-1;display:flex;justify-content:center;padding:2rem"><div class="spinner"></div></div>`;
  try{
    const res = await fetch(`${API}/trips`, {headers:authHeaders()});
    if(res.status===401){logout();return;}
    trips = await res.json();
    renderTripsGrid();
  } catch(e){ grid.innerHTML=`<div style="color:var(--ink3);padding:2rem">${lang==='ar'?'خطأ في التحميل':'Failed to load trips'}</div>`; }
}

function renderTripsGrid(){
  const grid = document.getElementById('trips-grid');
  if(trips.length===0){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      ${IC.plane}
      <h3>${tr('no_trips_h')}</h3>
      <p>${tr('no_trips_p')}</p>
      <button class="btn btn-green" onclick="openNewTrip()">${IC.plus}<span>${tr('new_trip')}</span></button>
    </div>`;
    return;
  }
  grid.innerHTML = trips.map(t=>{
    const color = COLORS[t.color]||COLORS.blue;
    const statusCls = STATUS_CLASS[t.status]||'status-planning';
    const statusLbl = tr('status_'+t.status)||t.status;
    const dateStr = t.start_date&&t.end_date ? `${t.start_date} → ${t.end_date}` : t.start_date||'';
    const budgetStr = t.budget>0 ? `${Number(t.budget).toLocaleString()} ${t.currency}` : '';
    return`<div class="trip-card color-${h(t.color)}" onclick="openTrip(${t.id})">
      <div class="trip-card-top" style="background:${color.bar}"></div>
      <div class="trip-card-body">
        <div class="trip-card-title">${h(t.title)}</div>
        ${t.destination?`<div class="trip-card-dest">${IC.map}<span>${h(t.destination)}</span></div>`:''}
        <div class="trip-card-meta">
          ${dateStr?`<div class="trip-meta-pill">${IC.calendar}<span>${h(dateStr)}</span></div>`:''}
          ${budgetStr?`<div class="trip-meta-pill">${IC.money}<span>${h(budgetStr)}</span></div>`:''}
          ${t.day_count>0?`<div class="trip-meta-pill"><span>${t.day_count} ${tr('days_count')}</span></div>`:''}
        </div>
      </div>
      <div class="trip-card-footer">
        <span class="trip-status ${statusCls}">${h(statusLbl)}</span>
        <div class="trip-card-actions" onclick="event.stopPropagation()">
          ${actBtn('pencil',tr('edit'),`openEditTripFromDash(${t.id})`)}
          ${actBtn('trash',tr('del'),`deleteTrip(${t.id})`,true)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openNewTrip(){
  editingTripId = null;
  document.getElementById('trip-modal-title').textContent = tr('modal_new_trip');
  ['t-title','t-dest','t-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-start').value='';
  document.getElementById('t-end').value='';
  document.getElementById('t-budget').value='';
  document.getElementById('t-currency').value='EUR';
  document.getElementById('t-color').value='blue';
  document.getElementById('t-status').value='planning';
  openModal('trip-modal');
}

function openEditTripFromDash(id){
  const t = trips.find(x=>x.id===id);
  if(!t) return;
  editingTripId = id;
  document.getElementById('trip-modal-title').textContent = tr('modal_edit_trip');
  document.getElementById('t-title').value = t.title;
  document.getElementById('t-dest').value = t.destination||'';
  document.getElementById('t-start').value = t.start_date||'';
  document.getElementById('t-end').value = t.end_date||'';
  document.getElementById('t-budget').value = t.budget||'';
  document.getElementById('t-currency').value = t.currency||'EUR';
  document.getElementById('t-color').value = t.color||'blue';
  document.getElementById('t-status').value = t.status||'planning';
  document.getElementById('t-notes').value = t.notes||'';
  openModal('trip-modal');
}

function openEditTrip(){ if(currentTrip) openEditTripFromDash(currentTrip.id); }

async function saveTrip(){
  const body = {
    title:document.getElementById('t-title').value.trim(),
    destination:document.getElementById('t-dest').value.trim(),
    start_date:document.getElementById('t-start').value,
    end_date:document.getElementById('t-end').value,
    budget:parseFloat(document.getElementById('t-budget').value)||0,
    currency:document.getElementById('t-currency').value,
    color:document.getElementById('t-color').value,
    status:document.getElementById('t-status').value,
    notes:document.getElementById('t-notes').value.trim(),
  };
  if(!body.title){toast(lang==='ar'?'يرجى إدخال عنوان':'Please enter a title');return;}
  try{
    let res;
    if(editingTripId){
      res = await fetch(`${API}/trips/${editingTripId}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify(body)});
    } else {
      res = await fetch(`${API}/trips`,{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});
    }
    if(!res.ok){toast('Error saving trip');return;}
    const saved = await res.json();
    closeModal('trip-modal');
    if(editingTripId){
      if(currentTrip&&currentTrip.id===editingTripId){ currentTrip=saved; renderTripInfoBar(); document.getElementById('editor-trip-title').textContent=saved.title; }
      trips = trips.map(t=>t.id===editingTripId?{...saved,day_count:t.day_count}:t);
    } else {
      trips.unshift({...saved,day_count:0});
    }
    renderTripsGrid(); toast(tr('saved'));
  } catch(e){ toast('Error'); }
}

async function deleteTrip(id){
  if(!confirm(tr('del')+'?')) return;
  try{
    await fetch(`${API}/trips/${id}`,{method:'DELETE',headers:authHeaders()});
    trips = trips.filter(t=>t.id!==id);
    renderTripsGrid(); toast(tr('deleted'));
  } catch(e){ toast('Error'); }
}

// ══ TRIP EDITOR ══════════════════════════════════════════
let currentTrip = null;
let currentDays = [];
let editDayId=null, editAttrId=null, editAttrDayId=null;
let activeNoteDayId=null, editNoteIdx=null, dragSrcIdx=null;

async function openTrip(id){
  const trip = trips.find(t=>t.id===id);
  if(!trip) return;
  currentTrip = trip;
  document.getElementById('editor-trip-title').textContent = trip.title;
  showScreen('screen-editor');
  renderTripInfoBar();
  await loadDays();
}

function renderTripInfoBar(){
  const t = currentTrip;
  const bar = document.getElementById('trip-info-bar');
  const budgetStr = t.budget>0 ? `${Number(t.budget).toLocaleString()} ${t.currency}` : '—';
  const dateStr = t.start_date&&t.end_date?`${t.start_date} → ${t.end_date}`: t.start_date||'—';
  bar.innerHTML = `
    ${t.destination?`<div class="trip-info-item"><div class="trip-info-label">${tr('dest_label')}</div><div class="trip-info-val">${h(t.destination)}</div></div>`:''}
    <div class="trip-info-item"><div class="trip-info-label">${tr('dates_label')}</div><div class="trip-info-val">${h(dateStr)}</div></div>
    <div class="trip-info-item"><div class="trip-info-label">${tr('budget_label')}</div><div class="trip-info-val trip-info-budget">${h(budgetStr)}</div></div>
    ${t.notes?`<div class="trip-info-item" style="flex:1;min-width:160px"><div class="trip-info-label">${tr('lbl_notes')}</div><div class="trip-info-val" style="font-weight:400;color:var(--ink3);font-size:12px">${h(t.notes)}</div></div>`:''}
  `;
}

async function loadDays(){
  const cont = document.getElementById('days-container');
  cont.innerHTML = `<div style="display:flex;justify-content:center;padding:2rem"><div class="spinner"></div></div>`;
  try{
    const res = await fetch(`${API}/trips/${currentTrip.id}/days`,{headers:authHeaders()});
    currentDays = await res.json();
    renderDays();
  } catch(e){ cont.innerHTML='<div style="color:var(--ink3);padding:1rem">Error loading days</div>'; }
}

function renderDays(){
  const cont = document.getElementById('days-container');
  cont.innerHTML='';
  currentDays.forEach((day,idx)=>{
    const reg = 'reg-'+(day.region||'cities');
    const regionLabel = tr('reg_'+(day.region||'cities'));
    const wrap = document.createElement('div');
    wrap.className='day-wrap'; wrap.draggable=true; wrap.dataset.idx=idx;

    const attrHtml = (day.attractions||[]).map(a=>`
      <div class="attr-row">
        <div class="attr-ico" style="opacity:0.8">${IC.mountain}</div>
        <div class="attr-info">
          <div class="attr-name">${h(a.name)}</div>
          <div class="attr-meta">${h(a.meta||'')}</div>
        </div>
        <div class="attr-right">
          <span class="cost-badge ${h(a.cost_type||'free')}">${h(a.cost||'')}</span>
          ${a.maps_url?`<a class="map-btn" href="${h(a.maps_url)}" target="_blank" rel="noopener">${IC.map}<span>${tr('open_maps')}</span></a>`:''}
          <div class="attr-acts">
            ${actBtn('pencil',tr('edit'),`openEditAttr(${day.id},${a.id})`)}
            ${actBtn('trash',tr('del'),`deleteAttr(${day.id},${a.id})`,true)}
          </div>
        </div>
      </div>`).join('');

    const calloutIcons={gem:'gem',cost:'coin',warn:'clock',dont:'star',car:'car',info:'info'};
    const calloutHtml = (day.callouts||[]).map(c=>`
      <div class="callout ${h(c.type||'info')}">
        ${icn(calloutIcons[c.type]||'info')}
        <span>${h(c.text)}</span>
        <button class="act danger callout-del" onclick="deleteCallout(${day.id},${c.id})" title="${tr('del')}">${IC.trash}</button>
      </div>`).join('');

    const notesHtml = (day.notes||[]).length===0
      ?`<div class="empty-notes">${tr('no_notes')}</div>`
      :(day.notes||[]).map((n,ni)=>`
        <div class="note-item">
          <div class="note-txt">${h(n.text)}</div>
          <div class="note-acts">
            ${actBtn('pencil',tr('edit'),`openEditNote(${day.id},${ni})`)}
            ${actBtn('trash',tr('del'),`deleteNote(${day.id},${n.id})`,true)}
          </div>
        </div>`).join('');

    wrap.innerHTML=`
      <div class="tl-col ${reg}">
        <div class="day-num">${day.num}</div>
        <div class="tl-line"></div>
      </div>
      <div class="day-content-col">
        <div class="day-card" id="dcard-${day.id}">
          <div class="day-head" onclick="toggleDay(${day.id})">
            <div class="day-head-left">
              <div class="day-title-txt">${h(day.title)}</div>
              <div class="day-sub-txt">${h(day.tagline||'')}</div>
              <div class="day-tags">
                ${day.drive?`<div class="drive-tag">${IC.car}<span>${h(day.drive)}</span></div>`:''}
                <span class="region-tag ${reg}">${h(regionLabel)}</span>
              </div>
            </div>
            <div class="day-head-right">
              ${actBtn('up',tr('move_up'),`event.stopPropagation();moveDay(${idx},-1)`)}
              ${actBtn('down',tr('move_down'),`event.stopPropagation();moveDay(${idx},1)`)}
              ${actBtn('pencil',tr('edit'),`event.stopPropagation();openEditDay(${day.id})`)}
              ${actBtn('trash',tr('del'),`event.stopPropagation();deleteDay(${day.id})`,true)}
              ${IC.chevron}
            </div>
          </div>
          <div class="day-body">
            <div class="sec-hdr">
              <span class="sec-lbl">${tr('sec_attractions')}</span>
              <button class="btn btn-sm" onclick="openAddAttr(${day.id})">${IC.plus}<span>${tr('add_attr')}</span></button>
            </div>
            <div class="attrs-list">${attrHtml}</div>
            ${calloutHtml?`<div class="callouts">${calloutHtml}</div>`:''}
            ${day.dont_miss?`<div class="callouts"><div class="callout dont">${IC.star}<span><strong>${tr('dont_miss')}</strong> ${h(day.dont_miss)}</span></div></div>`:''}
            <div class="notes-sec">
              <div class="notes-lbl">${tr('sec_notes')}</div>
              ${notesHtml}
              <button class="btn btn-sm" style="margin-top:6px" onclick="openAddNote(${day.id})">${IC.plus}<span>${tr('add_note_btn')}</span></button>
            </div>
          </div>
        </div>
      </div>`;

    wrap.addEventListener('dragstart',e=>{dragSrcIdx=idx;wrap.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    wrap.addEventListener('dragend',()=>document.querySelectorAll('.day-wrap').forEach(w=>w.classList.remove('dragging','drag-over')));
    wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('drag-over');});
    wrap.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
    wrap.addEventListener('drop',e=>{
      e.preventDefault();wrap.classList.remove('drag-over');
      if(dragSrcIdx!==null&&dragSrcIdx!==idx){
        const m=currentDays.splice(dragSrcIdx,1)[0];currentDays.splice(idx,0,m);
        reorderDays(); renderDays();
      }
    });
    cont.appendChild(wrap);
  });
}

function toggleDay(id){
  const c=document.getElementById('dcard-'+id);
  const open=c.classList.contains('expanded');
  document.querySelectorAll('.day-card').forEach(x=>x.classList.remove('expanded'));
  if(!open) c.classList.add('expanded');
}
function reopen(id){setTimeout(()=>{const c=document.getElementById('dcard-'+id);if(c)c.classList.add('expanded');},50);}
function renumberDays(){currentDays.forEach((d,i)=>d.num=i+1);}

async function moveDay(idx,dir){
  const to=idx+dir;
  if(to<0||to>=currentDays.length) return;
  [currentDays[idx],currentDays[to]]=[currentDays[to],currentDays[idx]];
  renumberDays(); await reorderDays(); renderDays();
}

async function reorderDays(){
  try{ await fetch(`${API}/trips/${currentTrip.id}/days/reorder`,{method:'POST',headers:authHeaders(),body:JSON.stringify({ids:currentDays.map(d=>d.id)})}); }
  catch(e){}
}

// ─── DAY MODAL ──────────────────────────────────────────
function openAddDay(){
  editDayId=null;
  document.getElementById('day-modal-title').textContent=tr('modal_add_day');
  ['d-title','d-tagline','d-drive','d-dont-miss'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('d-region').value='cities';
  openModal('day-modal');
}
function openEditDay(id){
  const day=currentDays.find(d=>d.id===id); if(!day) return;
  editDayId=id;
  document.getElementById('day-modal-title').textContent=tr('modal_edit_day');
  document.getElementById('d-title').value=day.title;
  document.getElementById('d-tagline').value=day.tagline||'';
  document.getElementById('d-region').value=day.region||'cities';
  document.getElementById('d-drive').value=day.drive||'';
  document.getElementById('d-dont-miss').value=day.dont_miss||'';
  openModal('day-modal');
}
async function saveDay(){
  const title=document.getElementById('d-title').value.trim(); if(!title) return;
  const body={
    num:editDayId?currentDays.find(d=>d.id===editDayId)?.num:(currentDays.length+1),
    title, tagline:document.getElementById('d-tagline').value.trim(),
    region:document.getElementById('d-region').value,
    drive:document.getElementById('d-drive').value.trim(),
    dont_miss:document.getElementById('d-dont-miss').value.trim(),
    position:editDayId?currentDays.find(d=>d.id===editDayId)?.position:currentDays.length,
  };
  try{
    let res;
    if(editDayId){
      res=await fetch(`${API}/trips/${currentTrip.id}/days/${editDayId}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify(body)});
      if(res.ok){ const idx=currentDays.findIndex(d=>d.id===editDayId); currentDays[idx]={...currentDays[idx],...body}; }
    } else {
      res=await fetch(`${API}/trips/${currentTrip.id}/days`,{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});
      if(res.ok){ const nd=await res.json(); nd.attractions=[];nd.notes=[];nd.callouts=[];currentDays.push(nd); }
    }
    closeModal('day-modal'); renderDays(); toast(tr('saved'));
    if(editDayId) reopen(editDayId);
  } catch(e){ toast('Error'); }
}
async function deleteDay(id){
  if(!confirm(tr('del')+'?')) return;
  try{
    await fetch(`${API}/trips/${currentTrip.id}/days/${id}`,{method:'DELETE',headers:authHeaders()});
    currentDays=currentDays.filter(d=>d.id!==id); renumberDays(); renderDays(); toast(tr('deleted'));
  } catch(e){ toast('Error'); }
}

// ─── ATTRACTION MODAL ───────────────────────────────────
function openAddAttr(dayId){
  editAttrId=null; editAttrDayId=dayId;
  document.getElementById('attr-modal-title').textContent=tr('modal_add_attr');
  ['a-name','a-meta','a-cost','a-maps'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a-cost-type').value='free';
  openModal('attr-modal');
}
function openEditAttr(dayId,attrId){
  const day=currentDays.find(d=>d.id===dayId); if(!day) return;
  const attr=day.attractions.find(a=>a.id===attrId); if(!attr) return;
  editAttrId=attrId; editAttrDayId=dayId;
  document.getElementById('attr-modal-title').textContent=tr('modal_edit_attr');
  document.getElementById('a-name').value=attr.name;
  document.getElementById('a-meta').value=attr.meta||'';
  document.getElementById('a-cost').value=attr.cost||'';
  document.getElementById('a-cost-type').value=attr.cost_type||'free';
  document.getElementById('a-maps').value=attr.maps_url||'';
  openModal('attr-modal');
}
async function saveAttr(){
  const name=document.getElementById('a-name').value.trim(); if(!name) return;
  const body={name,meta:document.getElementById('a-meta').value.trim(),cost:document.getElementById('a-cost').value.trim(),
    cost_type:document.getElementById('a-cost-type').value,maps_url:document.getElementById('a-maps').value.trim(),icon:'map'};
  const day=currentDays.find(d=>d.id===editAttrDayId);
  try{
    let res;
    if(editAttrId){
      res=await fetch(`${API}/trips/${currentTrip.id}/days/${editAttrDayId}/attractions/${editAttrId}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify({...body,position:day.attractions.find(a=>a.id===editAttrId)?.position||0})});
      if(res.ok){const i=day.attractions.findIndex(a=>a.id===editAttrId);day.attractions[i]={...day.attractions[i],...body};}
    } else {
      res=await fetch(`${API}/trips/${currentTrip.id}/days/${editAttrDayId}/attractions`,{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});
      if(res.ok){const na=await res.json();day.attractions.push(na);}
    }
    closeModal('attr-modal'); renderDays(); toast(tr('saved')); reopen(editAttrDayId);
  } catch(e){ toast('Error'); }
}
async function deleteAttr(dayId,attrId){
  const day=currentDays.find(d=>d.id===dayId); if(!day) return;
  try{
    await fetch(`${API}/trips/${currentTrip.id}/days/${dayId}/attractions/${attrId}`,{method:'DELETE',headers:authHeaders()});
    day.attractions=day.attractions.filter(a=>a.id!==attrId);
    renderDays(); toast(tr('deleted')); reopen(dayId);
  } catch(e){ toast('Error'); }
}

// ─── NOTE MODAL ─────────────────────────────────────────
function openAddNote(dayId){activeNoteDayId=dayId;editNoteIdx=null;document.getElementById('n-text').value='';openModal('note-modal');}
function openEditNote(dayId,idx){
  const day=currentDays.find(d=>d.id===dayId); if(!day) return;
  activeNoteDayId=dayId; editNoteIdx=idx;
  document.getElementById('n-text').value=day.notes[idx].text;
  openModal('note-modal');
}
async function saveNote(){
  const text=document.getElementById('n-text').value.trim(); if(!text) return;
  const day=currentDays.find(d=>d.id===activeNoteDayId);
  try{
    if(editNoteIdx!==null){
      const note=day.notes[editNoteIdx];
      await fetch(`${API}/trips/${currentTrip.id}/days/${activeNoteDayId}/notes/${note.id}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify({text,position:note.position||0})});
      day.notes[editNoteIdx].text=text;
    } else {
      const res=await fetch(`${API}/trips/${currentTrip.id}/days/${activeNoteDayId}/notes`,{method:'POST',headers:authHeaders(),body:JSON.stringify({text})});
      if(res.ok){const nn=await res.json();day.notes.push(nn);}
    }
    closeModal('note-modal'); renderDays(); toast(tr('saved')); reopen(activeNoteDayId);
  } catch(e){ toast('Error'); }
}
async function deleteNote(dayId,noteId){
  const day=currentDays.find(d=>d.id===dayId); if(!day) return;
  try{
    await fetch(`${API}/trips/${currentTrip.id}/days/${dayId}/notes/${noteId}`,{method:'DELETE',headers:authHeaders()});
    day.notes=day.notes.filter(n=>n.id!==noteId);
    renderDays(); toast(tr('deleted')); reopen(dayId);
  } catch(e){ toast('Error'); }
}
async function deleteCallout(dayId,calloutId){
  const day=currentDays.find(d=>d.id===dayId); if(!day) return;
  try{
    await fetch(`${API}/trips/${currentTrip.id}/days/${dayId}/callouts/${calloutId}`,{method:'DELETE',headers:authHeaders()});
    day.callouts=day.callouts.filter(c=>c.id!==calloutId);
    renderDays(); toast(tr('deleted')); reopen(dayId);
  } catch(e){ toast('Error'); }
}

// ══ MODAL HELPERS ════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ══ TOAST ════════════════════════════════════════════════
let _toastTimer;
function toast(msg,color){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=color||'';
  el.classList.add('show'); clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ══ INIT ════════════════════════════════════════════════
applyLang();
if(token&&currentUser){
  lang = currentUser.lang || lang;
  applyLang();
  showDash();
} else {
  showScreen('screen-login');
}
</script>
