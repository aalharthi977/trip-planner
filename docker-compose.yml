services:
  trip-planner-api:
    build: ./api
    container_name: trip-planner-api
    restart: unless-stopped
    environment:
      - SECRET_KEY=change-this-to-a-random-string-in-production
      - DB_PATH=/data/trips.db
    volumes:
      - ./data:/data
    networks:
      - trip-net

  trip-planner-web:
    image: nginx:alpine
    container_name: trip-planner-web
    restart: unless-stopped
    ports:
      - "8093:80"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - trip-planner-api
    networks:
      - trip-net

networks:
  trip-net:
    driver: bridge
